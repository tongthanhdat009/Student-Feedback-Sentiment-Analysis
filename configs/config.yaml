# Cấu hình chung cho dự án Phân tích Cảm xúc Phản hồi Sinh viên
# ================================================================

# Đường dẫn cache và lưu trữ
paths:
  # Thư mục cache cho models (để không cần tải lại)
  model_cache: "./cache/models"
  # Thư mục cache cho datasets (để không cần tải lại)
  dataset_cache: "./cache/datasets"
  # Thư mục lưu models đã train
  saved_models: "./saved_models"
  # Thư mục dữ liệu
  raw_data: "./data/raw/uit_vsfc"
  processed_data: "./data/processed/acsa"
  # Thư mục kết quả
  results: "./results"

# Cấu hình dataset
dataset:
  name: "uitnlp/vietnamese_students_feedback"
  # Cache dataset để không cần tải lại
  cache_dir: "./cache/datasets"
  # Splits
  train_split: "train"
  validation_split: "validation"
  test_split: "test"

# Cấu hình models
models:
  # PhoBERT model - sử dụng cache
  phobert:
    name: "vinai/phobert-base"
    cache_dir: "./cache/models"
    max_length: 256
    batch_size: 16
    epochs: 5
    learning_rate: 2e-5
    
  # LSTM model
  lstm:
    embedding_dim: 256
    hidden_dim: 128
    num_layers: 2
    dropout: 0.3
    batch_size: 32
    epochs: 20
    learning_rate: 0.001
    
  # SVM model
  svm:
    kernel: "rbf"
    C: 1.0
    gamma: "scale"

# Cấu hình preprocessing
preprocessing:
  # Lowercase text
  lowercase: true
  # Remove special characters
  remove_special_chars: true
  # Remove extra spaces
  remove_extra_spaces: true
  # Normalize unicode
  normalize_unicode: true

# Cấu hình training
training:
  seed: 42
  device: "cuda"  # hoặc "cpu" 
  early_stopping_patience: 3

# Labels
labels:
  sentiment:
    - "negative"
    - "neutral" 
    - "positive"
  topics:
    - "Lecturer"
    - "Training Program"
    - "Facility"
    - "Others"

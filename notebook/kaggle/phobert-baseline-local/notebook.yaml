slug: phobert-baseline-local
title: PhoBERT Baseline Local
description: Kaggle-managed copy created from notebook/PhoBERT_Baseline.ipynb
entry_file: notebook.ipynb
default_accelerator: NvidiaTeslaT4
default_timeout_seconds: 7200
tags:
  - nlp
  - sentiment
  - phobert
  - baseline
artifacts:
  - "*.csv"
  - "*.json"
  - "*.pt"
  - "summaries/*"
  - "visualizations/*"
params:
  epochs:
    type: int
    default: 5
  batch_size:
    type: int
    default: 16
  learning_rate:
    type: float
    default: 0.00002
